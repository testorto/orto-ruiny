<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ortofotomapa — Ruiny</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
  <style>
    html, body { margin: 0; height: 100%; }
    #map { width: 100%; height: 100%; background: #e8e8d8; }
    .info {
      position: absolute; z-index: 1000; bottom: 10px; left: 10px;
      background: rgba(255,255,255,0.85); padding: 6px 10px;
      font: 13px/1.4 sans-serif; border-radius: 4px; box-shadow: 0 1px 4px rgba(0,0,0,0.3);
    }
  </style>
</head>
<body>
  <div id="map"></div>
  <div class="info">
    Ortofotomapa — Ruiny (RGB), nalot 2026-05-26<br>
    Źródło: djiag.com &nbsp;|&nbsp; Powierzchnia pola: 29,42 ha
  </div>
  <script>
    window.addEventListener('load', function () {
      if (typeof L === 'undefined') {
        document.body.innerHTML = '<p style="font:16px sans-serif;padding:20px">Nie udało się załadować biblioteki mapy (Leaflet). Sprawdź połączenie z internetem i odśwież stronę.</p>';
        return;
      }

      // maxZoom calej mapy = jak bardzo klient moze przyblizyc (22)
      // maxNativeZoom ortofoto = 18 (tyle kafelkow masz) -> wyzej Leaflet rozciaga ostatni poziom
      var map = L.map('map', { maxZoom: 22 });

      var osm = L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
        maxZoom: 22,
        maxNativeZoom: 19,
        attribution: '© OpenStreetMap'
      }).addTo(map);

      var orto = L.tileLayer('tiles/{z}/{x}/{y}.png', {
        minZoom: 12,
        maxZoom: 22,
        maxNativeZoom: 21,
        tms: false,
        opacity: 1.0,
        attribution: 'Ortofoto: djiag.com'
      }).addTo(map);

      L.control.layers(
        { "OpenStreetMap": osm },
        { "Ortofotomapa": orto },
        { collapsed: false }
      ).addTo(map);

      map.setView([52.078, 21.169], 15);
    });
  </script>
</body>
</html>
