<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ortofotomapa — Ruiny</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    html, body { margin: 0; height: 100%; }
    #map { width: 100%; height: 100%; background: #e8e8d8; }
    .info {
      position: absolute; z-index: 1000; bottom: 10px; left: 10px;
      background: rgba(255,255,255,0.85); padding: 6px 10px;
      font: 13px/1.4 sans-serif; border-radius: 4px; box-shadow: 0 1px 4px rgba(0,0,0,0.3);
    }
  </style>
</head>
<body>
  <div id="map"></div>
  <div class="info">
    Ortofotomapa — Ruiny (RGB), nalot 2026-05-26<br>
    Źródło: djiag.com &nbsp;|&nbsp; Powierzchnia pola: 29,42 ha
  </div>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    var map = L.map('map');

    // Podklad OSM (kontekst: drogi, rzeki)
    var osm = L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
      maxZoom: 19,
      attribution: '© OpenStreetMap'
    }).addTo(map);

    // Twoje ortofoto (kafelki wygenerowane w QGIS)
    var orto = L.tileLayer('tiles/{z}/{x}/{y}.png', {
      minZoom: 12,
      maxZoom: 18,
      tms: false,
      opacity: 1.0,
      attribution: 'Ortofoto: djiag.com'
    }).addTo(map);

    // Przelacznik warstw
    L.control.layers(
      { "OpenStreetMap": osm },
      { "Ortofotomapa": orto },
      { collapsed: false }
    ).addTo(map);

    // Ustaw widok na obszar ortofoto (przyblizone wspolrzedne terenu)
    // EPSG:2180 ~ okolice 52.078 N, 21.169 E (z Twoich danych)
    map.setView([52.078, 21.169], 15);
  </script>
</body>
</html>
